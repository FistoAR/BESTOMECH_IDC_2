<!-- ==============================Taper push pulley start======================= -->

   <div class="lightbox-target" id="taper-bush-pulley">
    <div class="position-relative bg-[#c9c9c9] background_color1">

      <model-viewer src="./assets/models/50ml_hinged_container.glb"  ar-modes="webxr scene-viewer quick-look" field-of-view="45deg" camera-controls
        tone-mapping="neutral" poster="poster.webp" disable-zoom shadow-intensity="1"  min-camera-orbit="auto auto 0.1094m" min-field-of-view="22.98deg"  disable-pan disable-tap  style=" scale: 0.55; "></model-viewer>>
        <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
        </div>
      
      </model-viewer>
    </div>

    <a class="lightbox-close" href="#" onclick="javascript:window.close()"></a>
    <div class="deg">
      <img src="./assets/images/360-degrees.webp" alt="">
    </div>

     <!-- ✅ Full Color Picker -->
<div class=" border border-red-500 ">

 
  <div class="  color_picker">
    <!-- Hidden color input -->
    

    <!-- Image triggers the hidden input -->
    <img src="../lightBox/assets/images/colorwheel.png"
         alt="Color Picker"
         class="w-12 h-12 cursor-pointer color_picker1"
        
         onclick="document.getElementById('bgColorPicker1').click();">
         <input type="color" 
           id="bgColorPicker1" 
           value="#9bdfd5" 
           class="w-0 h-0 absolute left-[8%] bottom-[8%]">
  </div>
  <p class="absolute left-[2%] bottom-[3%]  font-bold">Background Color</p>
</div>

  </div>

<!-- *************************Background color************************ -->

<script>


    function initBgColor1() {
  const picker1 = document.getElementById("bgColorPicker1");
  const bg1= document.querySelector(".background_color1");

  if (!picker1 || !bg1) return;

  const updateColor1 = (color) => {
    bg1.style.backgroundColor = color;
  };

  picker1.addEventListener("input", (e) => updateColor1(e.target.value));


  picker1.addEventListener("change", (e) => updateColor1(e.target.value));


  picker1.addEventListener("click", () => picker1.focus());
}


window.addEventListener("DOMContentLoaded", () => {
  setTimeout(initBgColor1, 200); 
});
</script>

<script>

window.addEventListener("DOMContentLoaded", () => {
